<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <!-- Add some decorative elements -->
  <circle cx="200" cy="150" r="80" fill="rgba(255,255,255,0.1)" />
  <circle cx="1000" cy="500" r="60" fill="rgba(255,255,255,0.15)" />
  <circle cx="300" cy="500" r="40" fill="rgba(255,255,255,0.08)" />

  <!-- Text -->
  <text x="50%" y="40%" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="48" font-weight="600">
    Khushpreet Kaur
  </text>
  <text x="50%" y="50%" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="28" font-weight="400">
    Full Stack Developer Portfolio
  </text>

  <!-- Subtle pattern -->
  <defs>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle fill="rgba(255,255,255,0.05)" cx="5" cy="5" r="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#dots)" />
</svg>